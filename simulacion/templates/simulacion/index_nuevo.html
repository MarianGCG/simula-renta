<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulación de Renta (Nuevo)</title>

{% load static %}

<style>
body{
  font-family: Arial, sans-serif;
  background:#f0f2f7;
  padding:20px;
  font-size:14px;

}

.container{
  max-width:1000px;
  margin:auto;
  padding:0 12px;   /* 👈 clave */
}

h2{
  margin-bottom:20px;
  font-size:24px;   /* probá 24 o 26 */
  font-weight:700;
}

/* FILA */
.escenario-row{
  display:flex;
  gap:16px;
  margin-bottom:14px;
  align-items:stretch;
}

/* INPUT */
.escenario-input{
  width:40%;
  background:#fff;
  border:2px solid #1a3a6b;
  border-radius:10px;
  padding:12px;
}

.sc-num{
  font-size:16px;
  color:#1a3a6b;
  margin-bottom:8px;
  font-weight:bold;
  font-weight:600;
  min-width:110px;   /* 👈 alinea todos iguales */
}


.sc-inputs{
  display:grid;
  grid-template-columns: 110px 70px;
  gap:20px;

}



.sc-inputs .field{
  flex:1;
}

.field label{
  font-size:16px;
  display:block;
  margin-bottom:2px;
  white-space: nowrap;

}

.field input{
  width:100%;
  padding:6px 8px;
  height:34px;  
  margin-bottom:6px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
}

/* RESULTADO */


.res-item{
  display:flex;
  flex-direction:column;
  min-width:90px;
}

.res-content{
  display:flex;
  gap:20px;
  align-items:center;
  width:fit-content;     /* 👈 CLAVE TOTAL */
}


.mensual{
  padding-left:15px;
  border-left:1px solid #d1d5db;
}



.escenario-resultado{
  width:auto;              /* 👈 clave */
  background:#ffffff;
  color:#1a3a6b;
  border-radius:12px;
  padding:16px;

  display:none;
  opacity:0;

  display:grid;
  grid-template-columns: repeat(4, auto) 1fr;
  align-items:center;
  gap:25px;

  transition:opacity 0.3s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  border:2px solid #1a3a6b;
  min-width:380px;         /* opcional para que no quede muy chica */
  width:fit-content;       /* 👈 la mejor opción */

}





.res-block{
  display:flex;
  gap:20px;              /* 👈 más pegado */
}

.res-title{
  font-size:11px;
  color:#6b7280;   /* gris elegante */
}


.res-value{
  font-size:18px;
  font-weight:600;
  color:#1a3a6b;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

.res-big{
  font-size:18px;        /* 👈 igual tamaño */
  font-weight:600;
  color:#1a3a6b;
}



button{
  margin-top:20px;
  padding:10px 20px;
  background:#1a3a6b;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}




.acciones{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:20px;
  padding:0 50px;   /* probá entre 8px y 16px */
}


.container{
  padding:0 12px;
  max-width:1000px;   /* 👈 igual que .container */
}

.btn-calc{
  padding:10px 20px;
  background:#1a3a6b;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-print{
  padding:10px 20px;
  background:#4b5563;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  display:none;   /* 👈 oculto */
  gap:0px;  
  margin-left:auto;   /* 👈 ESTA es la clave */

}

.esc-header{
  display:flex;
  align-items:center;
  gap:10px;   /* 👈 controla distancia */
}

.header-box{
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  background:#243f6b;          /* azul oscuro */
  color:#fff;
  border-radius:12px;
  width:100%;
  max-width:1000px;   /* 👈 igual que .container */  
  padding:18px 20px;
  margin-bottom:20px;
  text-align:center;   /* 👈 centra todo */
}


.header-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:4px;
}

.header-subtitle{
  font-size:13px;
  opacity:0.85;
}

.res-wrapper{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
}

.toggle-tabla{
  background:none;
  border:none;
  color:#1a3a6b;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
}

.toggle-tabla:hover{
  text-decoration:underline;
}
.tabla-wrap{
  display:none;
  margin-top:10px;
}


.panel-tabla{
  position:fixed;
  top:120px;

  /* 👇 oculto fuera de pantalla */
  
  right:-500px;
  width:380px;
  max-height:600px;

  background:#fff;
  box-shadow:-4px 0 12px rgba(0,0,0,0.15);
  transition:right 0.3s ease;
  z-index:999;

  display:flex;
  flex-direction:column;
}




.panel-tabla.open{
  
  right:calc((100vw - 1000px)/2 - 400px);
}


.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:#1a3a6b;
  color:#fff;
  font-weight:600;
}

.panel-header button{
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

#panel-contenido{
  padding:12px;
  overflow-y:auto;   /* 👈 vertical SIEMPRE */

}

#panel-contenido table thead{

/* tabla */
#panel-contenido table{

#panel-contenido th,

#panel-contenido th:first-child,

.negative{

}



.negative-row{

.negative-row td{

}

.tabs{

  gap:10px;

}

.tab{

.tab-content{

}

.tab-content.active{

#tab-capital label{

}

#tab-capital select,
#tab-capital input{

}



.capital-card{

  padding:20px;

  width:fit-content;
  margin:30px auto;   /* 👈 CENTRADO */

  flex-direction:column;
  gap:16px;
}

.capital-row{

  align-items:center;

  justify-content:center;   /* 👈 centrado horizontal */
}

.capital-row .mensual{

}

#tabla-capital{

}

#tabla-capital table{

  font-size:12px;

}

#tabla-capital th{

}

#tabla-capital th,
#tabla-capital td{

  border-bottom:1px solid #e5e7eb;

}

#tabla-capital td:first-child,
#tabla-capital th:first-child{
  text-align:center;
}

#tabla-capital tr:last-child td{

}


.en-construccion{
  margin-top:40px;
  text-align:center;
  font-size:14px;
  color:#6b7280;
  margin-bottom:30px;
  background:#fff;

  border-radius:8px;

  width:fit-content;

.bloque{

.bloque-titulo{

.fila{

  gap:20px;

}

.btn-group button{

.btn-group button.active{

.resultado-grande{
  background:#243f6b;
  color:#fff;
  padding:30px;
  border-radius:14px;
  margin-top:20px;
  text-align:center;
}


</style>

</head>

<script>



let calculando = false;
let resultadosActuales = [];



// CSRF (importante para Django)
function getCsrfToken() {
  return document.cookie.split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))
    ?.split('=')[1] || '';
}

function fmt(n){
  return '$' + Math.round(n).toLocaleString('es-AR');
}

async function calcular(){

  calculando = true;

  const escenarios = [];



  document.querySelectorAll('.escenario-row').forEach(row => {

  const capital = row.querySelector('.sc-capital')?.value;
  const anios = row.querySelector('.sc-anios')?.value;

  if (capital && anios) {
      escenarios.push({
      capital: parseFloat(capital),
      anios: parseInt(anios)
      });
  }

  });




  try {
    const resp = await fetch('/calcular/',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-CSRFToken': getCsrfToken()
      },
      body: JSON.stringify({
        tasa_anual:0.05,
        perfil:'Moderado',
        escenarios
      })
    });

    const data = await resp.json();
    resultadosActuales = data.escenarios;

    data.escenarios.forEach((esc, idx)=>{
      const container = document.getElementById(`res-${idx+1}`);

      container.style.display = 'flex';
      setTimeout(() => container.style.opacity = '1', 50);



      container.innerHTML = `
      <div class="res-wrapper">

        <div class="res-content">

          <div class="res-item">
            <div class="res-title">Capital</div>
            <div class="res-value">${fmt(esc.capital)}</div>
          </div>

          <div class="res-item mensual">
            <div class="res-title">Años</div>
            <div class="res-value">${esc.anios}</div>
          </div>

          <div class="res-item mensual">
            <div class="res-title">Retiro anual</div>
            <div class="res-value">${fmt(esc.retiro_anual)}</div>
          </div>

          <div class="res-item mensual">
            <div class="res-title">Retiro mensual</div>
            <div class="res-value">${fmt(esc.retiro_mensual)}</div>
          </div>

        </div>

        <!-- BOTÓN -->
        <button class="toggle-tabla" onclick='abrirPanelDesdeIndice(${idx})'>
          ▶ Ver años
        </button>


      </div>

      <!-- TABLA -->
      <div class="tabla-wrap" id="tabla-${idx}">
        <table>
          <thead>
            <tr>
              <th>Año</th>
              <th>Capital inicio</th>
              <th>Interés</th>
              <th>Retiro anual</th>
              <th>Capital fin</th>
            </tr>
          </thead>
          <tbody>
            ${esc.tabla.map(row => `
              <tr>
                <td>${row.anio}</td>
                <td class="${row.capital_inicio < 0 ? 'negative' : ''}">${fmt(row.capital_inicio)}</td>
                <td class="${row.interes < 0 ? 'negative' : ''}">${fmt(row.interes)}</td>
                <td>${fmt(row.retiro_anual)}</td>
                <td class="${row.capital_fin < 0 ? 'negative' : ''}">${fmt(row.capital_fin)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      `;




    });

    document.querySelector('.btn-print').style.display = 'flex';
    calculando = false;
    
  } catch (e) {
    alert('Error al calcular');
    console.error(e);
  }

  
}


function toggleTabla(id, btn){
  const el = document.getElementById(id);

  if(el.style.display === 'none' || el.style.display === ''){
    el.style.display = 'block';
    btn.innerHTML = '▼ Ocultar';
  }else{
    el.style.display = 'none';
    btn.innerHTML = '▶ Ver años';
  }
}


function abrirPanel(tabla){

  const panel = document.getElementById('panel-tabla');
  const cont = document.getElementById('panel-contenido');

  // 🔥 SIEMPRE actualiza contenido
  cont.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Año</th>
          <th>Capital inicio</th>
          <th>Interés</th>
          <th>Retiro</th>
          <th>Capital fin</th>
        </tr>
      </thead>
      <tbody>

        ${tabla.map(row => `
          <tr class="${row.capital_fin < 0 ? 'negative-row' : ''}">
            <td>${row.anio}</td>
            <td>${fmt(row.capital_inicio)}</td>
            <td>${fmt(row.interes)}</td>
            <td>${fmt(row.retiro_anual)}</td>
            <td class="${row.capital_fin < 0 ? 'negative' : ''}">
              ${fmt(row.capital_fin)}
            </td>

          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  // 🔥 SI YA ESTÁ ABIERTO, IGUAL refresca (esto es lo que te faltaba)   // 
  panel.classList.add('open');
  
}


function cerrarPanel(){
  document.getElementById('panel-tabla').classList.remove('open');
}

window.onload = () => {
  document.getElementById('panel-tabla').classList.remove('open');
}


let ultimaEjecucion = 0;

function calcularWrapper(){
  const ahora = Date.now();
  if(ahora - ultimaEjecucion < 300) return;

  ultimaEjecucion = ahora;

  document.getElementById('panel-tabla').classList.remove('open');
  calcular();
}





document.querySelectorAll('.sc-capital, .sc-anios').forEach(input => {

  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      calcularWrapper();
    }
  });

  input.addEventListener('blur', calcularWrapper);

});




const inputsOrdenados = Array.from(
  document.querySelectorAll('.sc-capital, .sc-anios')
);

inputsOrdenados.forEach((input, index) => {

  input.addEventListener('keydown', function(e){

    if(e.key === 'Tab'){
      e.preventDefault();

      let siguiente;

      if(e.shiftKey){
        // SHIFT + TAB (hacia atrás)
        siguiente = index === 0 
          ? inputsOrdenados.length - 1 
          : index - 1;
      } else {
        // TAB normal (hacia adelante)
        siguiente = index === inputsOrdenados.length - 1 
          ? 0 
          : index + 1;
      }

      inputsOrdenados[siguiente].focus();
    }

  });

});



function abrirPanelDesdeIndice(idx){

  // si está calculando, esperamos y reintentamos
  if(calculando){
    setTimeout(() => abrirPanelDesdeIndice(idx), 200);
    return;
  }

  if(!resultadosActuales[idx]) return;

  abrirPanel(resultadosActuales[idx].tabla);
}

function cambiarTab(tab){

  // reset
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  if(tab === 'capital'){

    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('tab-capital').classList.add('active');

    initCapital();
    calcularCapital();

  }else if(tab === 'renta'){

    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tab-renta').classList.add('active');

    initRenta();

  }else if(tab === 'capital2'){

    document.querySelectorAll('.tab')[2].classList.add('active');
    document.getElementById('tab-capital2').classList.add('active');

    calcularCapital2();  // 👈 tu nueva lógica

  }

  // cerrar panel lateral siempre
  document.getElementById('panel-tabla').classList.remove('open');
}



function calcularCapital(){

  const idx = document.getElementById("combo-retiro").value;
  if(idx === "") return;
  const combo = combos[idx];
  if(!combo) return;
  const tasa = parseFloat(document.getElementById("tasa").value) / 100;
  const cont = document.getElementById("resultado-capital");

  let html = `<div class="capital-card">`;

  combo.anios.forEach(anio => {

    const r = tasa / 12;
    const n = anio * 12;

    let capital;

    if(r === 0){
      capital = combo.retira * n;
    }else{
      capital = combo.retira * (1 - Math.pow(1 + r, -n)) / r;
    }

    html += `
      <div class="capital-row">

        <div class="res-item mensual">
          <div class="res-title">Retiro mensual</div>
          <div class="res-value">$${combo.retira.toLocaleString('es-AR')}</div>
        </div>

        <div class="res-item mensual">
          <div class="res-title">Años</div>
          <div class="res-value">${anio}</div>
        </div>

        <div class="res-item">
          <div class="res-title">Capital</div>
          <div class="res-value">$${Math.round(capital).toLocaleString('es-AR')}</div>
        </div>

        <button class="toggle-tabla"
          onclick="mostrarDetalle(${capital}, ${combo.retira}, ${tasa}, ${anio})">
          ▶ Detalle años
        </button>

      </div>
    `;
  });

  html += `</div>`;

  cont.innerHTML = html;


  // 👇 mostrar automáticamente el primero
  if(combo.anios.length > 0){

    const anio = combo.anios[0];

    const r = tasa / 12;
    const n = anio * 12;

    let capital;

    if(r === 0){
      capital = combo.retira * n;
    }else{
      capital = combo.retira * (1 - Math.pow(1 + r, -n)) / r;
    }

    mostrarDetalle(capital, combo.retira, tasa, anio);
  }

}



function initCapital(){

  const combo = document.getElementById("combo-retiro");
  const tasaInput = document.getElementById("tasa");

  if(!combo || !tasaInput) return;

  combo.addEventListener("change", calcularCapital);

  tasaInput.addEventListener("blur", calcularCapital);

  tasaInput.addEventListener("keydown", e=>{

}

function generarTablaCapital(capitalInicial, retiroMensual, tasa, anios){

  let capital = capitalInicial;

  let html = `
    <table>
      <thead>
        <tr>
          <th>Año</th>
          <th>Capital inicio</th>
          <th>Interés</th>
          <th>Retiro</th>
          <th>Capital fin</th>
        </tr>
      </thead>
      <tbody>
  `;

  for(let i=1; i<=anios; i++){

    const interes = capital * tasa;
    const retiro = retiroMensual * 12;
    const capitalFin = capital + interes - retiro;

    html += `
      <tr class="${capitalFin < 0 ? 'negative-row' : ''}">
        <td>${i}</td>
        <td>$${Math.round(capital).toLocaleString('es-AR')}</td>
        <td>$${Math.round(interes).toLocaleString('es-AR')}</td>
        <td>$${Math.round(retiro).toLocaleString('es-AR')}</td>
        <td class="${capitalFin < 0 ? 'negative' : ''}">
          $${Math.round(capitalFin).toLocaleString('es-AR')}
        </td>
      </tr>
    `;

    capital = capitalFin;
  }

  html += "</tbody></table>";

  document.getElementById("tabla-capital").innerHTML = html;
}



function mostrarDetalle(capital, retiro, tasa, anios){
  generarTablaCapital(capital, retiro, tasa, anios);
}

function calcularCapital2(){

  const monto = parseFloat(document.getElementById("monto2").value);

  let retiroMensual = freq === "mensual"
    ? monto
    : monto / 12;

  const n = anios * 12;

  let capital;

  if(r === 0){

        ${freq} durante ${anios} años
      </div>
    </div>
  `;
}
